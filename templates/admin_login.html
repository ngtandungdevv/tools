<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Login | Auto System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #090b10;
            --surface: #131722;
            --border: #30364d;
            --cyan: #00e5ff;
            --red: #ff3366;
            --text: #f0f6fc;
            --dim: #8b949e;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            -webkit-tap-highlight-color: transparent; position: relative;
        }

        body::before {
            content: ''; position: absolute; inset: 0;
            background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0;
        }

        .login-box {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
            padding: 40px; width: 100%; max-width: 400px; position: relative; z-index: 1;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center;
        }

        .icon {
            width: 64px; height: 64px; border-radius: 16px;
            background: rgba(0,229,255,0.1); border: 1px solid var(--cyan);
            color: var(--cyan); display: inline-flex; align-items: center; justify-content: center;
            font-size: 28px; margin-bottom: 24px; box-shadow: 0 0 20px rgba(0,229,255,0.2);
        }

        h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }
        p { font-size: 13px; color: var(--dim); margin-bottom: 32px; }

        .form-group { text-align: left; margin-bottom: 24px; position: relative; }
        .form-group i { position: absolute; left: 16px; top: 16px; color: var(--dim); font-size: 14px; }
        .form-group input {
            width: 100%; background: #000; border: 1px solid var(--border); border-radius: 8px;
            padding: 14px 16px 14px 44px; color: #fff; font-size: 15px; font-family: 'JetBrains Mono', monospace;
            outline: none; transition: 0.2s;
        }
        .form-group input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,229,255,0.1); }

        .btn {
            width: 100%; background: var(--cyan); color: #000; border: none; border-radius: 8px;
            padding: 14px; font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
            cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover { background: #00b8cc; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,229,255,0.3); }

        .back-link {
            display: inline-block; margin-top: 24px; color: var(--dim); text-decoration: none;
            font-size: 12px; font-weight: 600; transition: 0.2s;
        }
        .back-link:hover { color: var(--cyan); }

        .flash {
            background: rgba(255,51,102,0.1); border: 1px solid var(--red); color: var(--red);
            padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 24px; font-weight: 600; outline: none;
        }
        
        @media (max-width: 480px) {
            .login-box { padding: 32px 24px; }
            .icon { width: 56px; height: 56px; font-size: 24px; }
            h2 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="icon"><i class="fas fa-shield-alt"></i></div>
        <h2>SYSTEM_ADMIN</h2>
        <p>Restricted Area - Authentication Required</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash"><i class="fas fa-exclamation-triangle"></i> {{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/admin" method="POST">
            <div class="form-group">
                <i class="fas fa-key"></i>
                <input type="password" name="password" required placeholder="Enter Secret Code" autocomplete="off" autofocus>
            </div>
            <button type="submit" class="btn">Authenticate</button>
        </form>

        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Return to Dashboard</a>
    </div>
</body>
</html>
