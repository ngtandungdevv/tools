<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALL SPAMMER | Attack Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #14100c;
            --bg2: #1c1510;
            --orange: #ff7b1a;
            --red: #ff3311;
            --amber: #ffbb33;
            --text: #ffffff;
            --dim: #bba08d;
            --border: rgba(255,123,26,0.25);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,123,26,0.03) 2px, rgba(255,123,26,0.03) 4px);
            pointer-events: none; z-index: 0;
        }

        .header {
            position: relative; z-index: 10; background: rgba(20,16,12,0.95);
            border-bottom: 2px solid var(--border); padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .header-brand { display: flex; align-items: center; gap: 12px; }
        .header-icon {
            width: 40px; height: 40px; background: linear-gradient(135deg, var(--red), var(--orange));
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #fff; box-shadow: 0 0 15px rgba(255,123,26,0.4);
        }

        .header-text .title { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 1px; text-transform: uppercase; }
        .header-text .sub { font-size: 11px; color: var(--orange); letter-spacing: 1px; }

        .back-link {
            color: var(--text); text-decoration: none; font-size: 13px; font-weight: 600;
            background: rgba(255,123,26,0.1); border: 1px solid var(--orange); padding: 8px 16px;
            border-radius: 6px; transition: 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .back-link:hover { background: var(--orange); color: #000; }

        .main { position: relative; z-index: 1; flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 520px; }

        .hud-panel {
            background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
            padding: 32px; margin-bottom: 16px; position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hud-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--red), var(--orange));
        }

        .hud-title {
            display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700;
            color: #fff; letter-spacing: 1px; margin-bottom: 24px; padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,123,26,0.15);
        }

        .dot {
            width: 10px; height: 10px; border-radius: 50%; background: var(--red);
            box-shadow: 0 0 10px var(--red); animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.3);opacity:0.6} }

        .field-label { font-size: 12px; font-weight: 600; color: var(--dim); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .field-label i { color: var(--orange); }

        .field-input {
            width: 100%; background: #0a0806; border: 1px solid var(--border); border-radius: 6px;
            padding: 16px; color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 16px;
            font-weight: 600; outline: none; transition: 0.2s; margin-bottom: 20px;
        }
        .field-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,123,26,0.15); }
        .field-input::placeholder { color: rgba(255,255,255,0.2); }

        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .attack-btn {
            width: 100%; padding: 18px; background: linear-gradient(135deg, var(--red), var(--orange));
            border: none; border-radius: 8px; color: #fff; font-family: 'JetBrains Mono', monospace;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 10px;
        }
        .attack-btn:hover { filter: brightness(1.2); box-shadow: 0 8px 25px rgba(255,123,26,0.4); }
        .attack-btn:disabled { background: #332211; color: #664422; box-shadow: none; cursor: not-allowed; }

        .stop-btn {
            width: 100%; padding: 18px; background: rgba(255,51,17,0.1); border: 1px solid var(--red);
            border-radius: 8px; color: var(--red); font-family: 'JetBrains Mono', monospace;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s;
            display: none; align-items: center; justify-content: center; gap: 12px; margin-top: 10px;
        }
        .stop-btn:hover { background: var(--red); color: #fff; }

        .log-box {
            background: #0a0806; border: 1px solid var(--border); border-radius: 8px;
            padding: 16px; font-size: 13px; line-height: 1.6; display: none; margin-top: 16px; color: #fff;
        }
        .log-box.show { display: block; }
        .log-box.success { border-color: #00f260; color: #00f260; border-left: 4px solid #00f260; }
        .log-box.error { border-color: var(--red); color: #ff6666; border-left: 4px solid var(--red); }
        .log-box.loading { border-color: var(--amber); color: var(--amber); border-left: 4px solid var(--amber); }

        .note-text { font-size: 11px; color: var(--dim); text-align: center; margin-top: 20px; line-height: 1.6; }

        @media (max-width: 600px) {
            .header { padding: 12px 16px; }
            .header-text .title { font-size: 13px; }
            .header-text .sub { display: none; }
            .back-link { padding: 6px 12px; font-size: 12px; }
            .hud-panel { padding: 20px; }
            .field-row { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-brand">
            <div class="header-icon"><i class="fas fa-phone-volume"></i></div>
            <div class="header-text">
                <div class="title">Call Spammer</div>
                <div class="sub">ATTACK PAYLOAD TERMINAL</div>
            </div>
        </div>
        <a href="/" class="back-link"><i class="fas fa-chevron-left"></i> Return</a>
    </header>

    <main class="main">
        <div class="card">
            <div class="hud-panel">
                <div class="hud-title"><div class="dot"></div> TARGET ACQUISITION</div>

                <div>
                    <div class="field-label"><i class="fas fa-crosshairs"></i> SĐT MỤC TIÊU</div>
                    <input type="tel" class="field-input" id="phone" placeholder="0912 345 678" autocomplete="off">
                </div>

                <div class="field-row">
                    <div>
                        <div class="field-label"><i class="fas fa-repeat"></i> SỐ LẦN</div>
                        <input type="number" class="field-input" id="count" value="5" min="1" max="100">
                    </div>
                    <div>
                        <div class="field-label"><i class="fas fa-bolt"></i> MODE</div>
                        <input type="text" class="field-input" value="AUTO" readonly style="color:var(--amber);">
                    </div>
                </div>

                <button class="attack-btn" id="btn" onclick="startSpam()"><i class="fas fa-satellite-dish"></i> INITIATE ATTACK</button>
                <button class="stop-btn" id="stop-btn" onclick="stopSpam()"><i class="fas fa-hand"></i> ABORT MISSION</button>

                <div class="note-text">Tool sẽ khởi động tiến trình tấn công ngầm trên máy chủ. Nhấn ABORT để dừng.</div>
            </div>
            <div class="log-box" id="log-box"></div>
        </div>
    </main>

    <script>
        async function startSpam() {
            const phone = document.getElementById('phone').value.trim();
            const count = parseInt(document.getElementById('count').value);
            const btn = document.getElementById('btn');

            if (!phone) { showLog('error', '⚠ Vui lòng nhập số điện thoại mục tiêu!'); return; }
            if (count <= 0) { showLog('error', '⚠ Số lần spam phải >= 1!'); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> TRANSMITTING...';
            showLog('loading', `► Đang lock mục tiêu: ${phone}...\n► Khởi tạo ${count} request(s)...\n► Chờ phản hồi từ server...`);

            try {
                const res = await fetch('/api/call-spam/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone, count }) });
                const data = await res.json();
                if (data.success) {
                    showLog('success', `✔ ATTACK INITIATED SUCCESSFULLY\n► Mục tiêu: ${phone}\n► Số lần: ${count} request(s)\n► Tiến trình đang chạy ngầm...`);
                    btn.style.display = 'none'; document.getElementById('stop-btn').style.display = 'flex';
                } else {
                    showLog('error', `✖ LỖI: ${data.message}`);
                    btn.disabled = false; btn.innerHTML = '<i class="fas fa-satellite-dish"></i> INITIATE ATTACK';
                }
            } catch (e) {
                showLog('error', `✖ NETWORK ERROR: ${e.message}`);
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-satellite-dish"></i> INITIATE ATTACK';
            }
        }

        async function stopSpam() {
            const phone = document.getElementById('phone').value.trim();
            const stopBtn = document.getElementById('stop-btn');
            stopBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ABORTING...'; stopBtn.disabled = true;

            try {
                const res = await fetch('/api/call-spam/stop', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone }) });
                const data = await res.json();
                showLog('error', `■ MISSION ABORTED\n► ${data.message}`);
            } catch (e) { console.error(e); }
            finally {
                stopBtn.style.display = 'none'; stopBtn.disabled = false; stopBtn.innerHTML = '<i class="fas fa-hand"></i> ABORT MISSION';
                const btn = document.getElementById('btn'); btn.style.display = 'flex'; btn.disabled = false; btn.innerHTML = '<i class="fas fa-satellite-dish"></i> INITIATE ATTACK';
            }
        }

        function showLog(type, msg) {
            const log = document.getElementById('log-box');
            log.className = 'log-box show ' + type;
            log.innerHTML = msg.replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
