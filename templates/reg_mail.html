<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REG MAIL PRO</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/chat.css">
    <style>
        :root {
            --bg: #090b10;
            --surface: #131722;
            --surface2: #1a1d27;
            --border: #30364d;
            --primary: #9d00ff;
            --primary-hover: #b84dff;
            --text: #f0f6fc;
            --dim: #8b949e;
            --green: #00ff88;
            --red: #ff3366;
            --cyan: #00e5ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Nav */
        nav {
            background: rgba(19, 23, 34, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo i { color: var(--primary); font-size: 24px; }
        .back-btn { background: transparent; color: var(--text); border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; text-decoration: none; transition: 0.2s; font-size: 14px; }
        .back-btn:hover { background: var(--surface2); color: var(--primary); border-color: var(--primary); }

        .container {
            flex: 1;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .panel-header {
            padding: 16px 20px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        /* Forms & Inputs */
        .control-group { padding: 20px; border-bottom: 1px solid var(--border); }
        .control-group label { display: block; font-size: 13px; color: var(--dim); margin-bottom: 8px; }
        .input-box {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            margin-bottom: 16px;
        }
        .input-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(157, 0, 255, 0.15); }
        
        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 15px;
        }
        .btn-submit:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(157, 0, 255, 0.3); }

        /* Tables & Lists */
        .acc-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .acc-item {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(0,0,0,0.2);
        }
        .acc-item:hover, .acc-item.active {
            border-color: var(--primary);
            background: rgba(157,0,255,0.05);
        }
        .acc-mail { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 4px; word-break: break-all; }
        .acc-pwd { font-size: 11px; color: var(--dim); display: flex; justify-content: space-between; }
        .acc-pwd span { color: var(--cyan); }

        /* Inbox View */
        .workspace {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #000;
            border-radius: 8px;
            margin: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .workspace-header {
            padding: 15px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .workspace-body {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .inbox-list {
            height: 200px;
            overflow-y: auto;
            border-bottom: 1px solid var(--border);
        }
        .msg-row {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
        }
        .msg-row:hover { background: var(--surface); }
        .msg-from { font-weight: 600; font-size: 13px; color: var(--cyan); }
        .msg-subject { font-size: 13px; color: #fff; margin-top: 4px; }
        
        .msg-content {
            flex: 1;
            padding: 20px;
            background: #fff;
            color: #000;
            overflow-y: auto;
            font-family: sans-serif;
            min-height: 300px;
        }

        .status-badge {
            background: rgba(0,255,136,0.1);
            color: var(--green);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .workspace { margin: 0; border: none; border-radius: 0; border-top: 1px solid var(--border); }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">
            <i class="fas fa-envelopes-bulk"></i>
            REG MAIL PRO
        </a>
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </nav>

    <div class="container">
        <!-- Control Panel -->
        <div class="panel">
            <div class="panel-header"><i class="fas fa-cogs"></i> Generator Controller</div>
            <div class="control-group">
                <label>Number of Accounts to Generate (Max 50)</label>
                <input type="number" id="accCount" class="input-box" min="1" max="50" value="1">
                <button class="btn-submit" id="btnReg" onclick="startReg()"><i class="fas fa-bolt"></i> Generate Mails</button>
            </div>
            
            <div class="panel-header" style="border-top:1px solid var(--border); border-bottom:0;"><i class="fas fa-list"></i> Accounts List</div>
            <div class="acc-list" id="accountList">
                <div style="text-align:center; padding:20px; color:var(--dim); font-size:13px;">No accounts generated yet</div>
            </div>
        </div>

        <!-- Inbox Panel -->
        <div class="panel" style="background:var(--surface);">
            <div class="panel-header" id="inboxTitle"><i class="fas fa-inbox"></i> Inbox View</div>
            <div class="workspace">
                <div class="workspace-header">
                    <div>
                        <span id="currentMail" style="font-family:'JetBrains Mono'; font-weight:600; color:#fff;">Select an account</span>
                    </div>
                    <div>
                        <button class="back-btn" onclick="syncInbox()" style="padding:6px 12px;"><i class="fas fa-sync-alt"></i> Sync</button>
                    </div>
                </div>
                
                <div class="workspace-body">
                    <div class="inbox-list" id="inboxList">
                        <div style="text-align:center; padding:20px; color:var(--dim); font-size:13px;">Select an account to view messages</div>
                    </div>
                    <div class="msg-content" id="msgContent">
                        <div style="text-align:center; padding:50px; color:#999; font-size:14px;">Message content will appear here</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/chat.js"></script>
    <script>
        let accounts = [];
        let activeAccount = null;

        function startReg() {
            const count = document.getElementById('accCount').value;
            const btn = document.getElementById('btnReg');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
            btn.disabled = true;

            fetch('/api/mail/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ count: parseInt(count) })
            }).then(r=>r.json()).then(data => {
                btn.innerHTML = '<i class="fas fa-bolt"></i> Generate Mails';
                btn.disabled = false;
                
                if(data.success) {
                    accounts = [...accounts, ...data.accounts];
                    renderAccounts();
                } else {
                    alert('Error: ' + data.message);
                }
            }).catch(e => {
                btn.innerHTML = '<i class="fas fa-bolt"></i> Generate Mails';
                btn.disabled = false;
                alert('Connection error');
            });
        }

        function renderAccounts() {
            const list = document.getElementById('accountList');
            if(accounts.length === 0) return;
            list.innerHTML = '';
            
            accounts.forEach((acc, i) => {
                const div = document.createElement('div');
                div.className = `acc-item ${activeAccount === acc ? 'active' : ''}`;
                div.onclick = () => selectAccount(acc);
                div.innerHTML = `
                    <div class="acc-mail">${acc.mail}</div>
                    <div class="acc-pwd">PW: <span>${acc.pwd}</span></div>
                `;
                list.appendChild(div);
            });
        }

        function selectAccount(acc) {
            activeAccount = acc;
            renderAccounts();
            document.getElementById('currentMail').textContent = acc.mail;
            syncInbox();
        }

        function syncInbox() {
            if(!activeAccount) return;
            const list = document.getElementById('inboxList');
            list.innerHTML = '<div style="text-align:center; padding:20px; color:var(--dim);"><i class="fas fa-spinner fa-spin"></i> Fetching...</div>';
            document.getElementById('msgContent').innerHTML = '<div style="text-align:center; padding:50px; color:#999; font-size:14px;">Select a message</div>';

            fetch('/api/mail/inbox', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ token: activeAccount.token })
            }).then(r=>r.json()).then(data => {
                list.innerHTML = '';
                if(data.success) {
                    if(data.messages.length === 0) list.innerHTML = '<div style="text-align:center; padding:20px; color:var(--dim);">Inbox empty</div>';
                    data.messages.forEach(m => {
                        const row = document.createElement('div');
                        row.className = 'msg-row';
                        row.onclick = () => readMail(m.id);
                        row.innerHTML = `
                            <div>
                                <div class="msg-from">${m.from.address}</div>
                                <div class="msg-subject">${m.subject}</div>
                            </div>
                        `;
                        list.appendChild(row);
                    });
                } else {
                    list.innerHTML = `<div style="text-align:center; padding:20px; color:var(--red);">${data.message}</div>`;
                }
            });
        }

        function readMail(msgId) {
            if(!activeAccount) return;
            const content = document.getElementById('msgContent');
            content.innerHTML = '<div style="text-align:center; padding:50px; color:#999;"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';

            fetch('/api/mail/read', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ token: activeAccount.token, msg_id: msgId })
            }).then(r=>r.json()).then(data => {
                if(data.success) {
                    content.innerHTML = data.content;
                } else {
                    content.innerHTML = `<div style="text-align:center; padding:50px; color:var(--red);">${data.message}</div>`;
                }
            });
        }
    </script>
</body>
</html>
