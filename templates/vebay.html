<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fake Vé Bay VNA</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/chat.css">
    <style>
        :root {
            --bg: #090b10;
            --surface: #131722;
            --surface2: #1a1d27;
            --border: #30364d;
            --primary: #00e5ff;
            --primary-hover: #00b8cc;
            --text: #f0f6fc;
            --dim: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Nav */
        nav {
            background: rgba(19, 23, 34, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo i { color: var(--primary); font-size: 24px; }
        .back-btn { background: transparent; color: var(--text); border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; text-decoration: none; transition: 0.2s; font-size: 14px; }
        .back-btn:hover { background: var(--surface2); color: var(--primary); border-color: var(--primary); }

        .container {
            flex: 1;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .panel-header {
            padding: 16px 20px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        /* Forms & Inputs */
        .control-group { padding: 20px; display: flex; flex-direction: column; gap:12px; overflow-y: auto;}
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-wrapper { display: flex; flex-direction: column; gap: 6px; }
        .input-wrapper label { font-size: 12px; color: var(--dim); }
        .input-box {
            width: 100%; background: #000; border: 1px solid var(--border); color: #fff;
            padding: 10px 14px; border-radius: 8px; font-family: 'Inter', sans-serif;
            font-size: 14px; outline: none; transition: 0.2s;
        }
        .input-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.15); }
        
        .btn-submit {
            width: 100%; background: var(--primary); color: #000; border: none; padding: 14px;
            border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px;
            margin-top: 10px;
        }
        .btn-submit:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3); }

        /* Preview Panel */
        .preview-area {
            flex: 1; padding: 20px; display: flex; align-items: center; justify-content: center;
            background: repeating-linear-gradient(45deg, #131722, #131722 10px, #1a1d27 10px, #1a1d27 20px);
            position: relative; overflow: hidden;
        }
        .preview-img { max-width: 100%; max-height: 70vh; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); display: none; }
        .empty-state { color: var(--dim); display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .empty-state i { font-size: 40px; color: #30364d; }

        .btn-download {
            position: absolute; bottom: 20px; right: 20px;
            background: #fff; color: #000; border: none; padding: 10px 20px;
            border-radius: 20px; font-weight: 600; cursor: pointer; display: none; gap: 8px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2); transition: 0.2s; text-decoration: none;
        }
        .btn-download:hover { transform: scale(1.05); }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">
            <i class="fas fa-plane-departure"></i>
            FAKE VÉ BAY
        </a>
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </nav>

    <div class="container">
        <!-- Control Panel -->
        <div class="panel">
            <div class="panel-header"><i class="fas fa-cogs"></i> Form Ticket (VNA)</div>
            <div class="control-group">
                <div class="input-wrapper">
                    <label>Họ và Tên</label>
                    <input type="text" id="name" class="input-box" placeholder="VD: NGUYEN VAN A">
                </div>
                <div class="form-row">
                    <div class="input-wrapper">
                        <label>Mã Đặt Chỗ (Code)</label>
                        <input type="text" id="code" class="input-box" placeholder="VD: QTXLL">
                    </div>
                    <div class="input-wrapper">
                        <label>Số Hiệu Chuyến Bay</label>
                        <input type="text" id="flight" class="input-box" placeholder="VD: 0224">
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-wrapper">
                        <label>Điểm Đi (Mã Sân Bay)</label>
                        <input type="text" id="from_kh" class="input-box" placeholder="VD: SGN">
                    </div>
                    <div class="input-wrapper">
                        <label>Điểm Đến (Mã Sân Bay)</label>
                        <input type="text" id="to_kh" class="input-box" placeholder="VD: HAN">
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-wrapper">
                        <label>Tên Điểm Đi (Full)</label>
                        <input type="text" id="from" class="input-box" placeholder="HO CHI MINH CITY">
                    </div>
                    <div class="input-wrapper">
                        <label>Tên Điểm Đến (Full)</label>
                        <input type="text" id="to" class="input-box" placeholder="HANOI">
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-wrapper">
                        <label>Giờ Bay</label>
                        <input type="text" id="depart" class="input-box" placeholder="22:00">
                    </div>
                    <div class="input-wrapper">
                        <label>Giờ Hạ Cánh</label>
                        <input type="text" id="arrive" class="input-box" placeholder="00:10">
                    </div>
                </div>
                <div class="input-wrapper">
                    <label>Ngày Bay (DD/MM/YYYY)</label>
                    <input type="text" id="date" class="input-box" placeholder="29/10/2025">
                </div>

                <div class="input-wrapper">
                    <details style="color:var(--dim); font-size:12px; cursor:pointer;">
                        <summary>Cài đặt nâng cao</summary>
                        <div style="margin-top:10px; display:flex; flex-direction:column; gap:10px;">
                            <input type="text" id="plane" class="input-box" placeholder="Loại máy bay: Airbus A321">
                            <input type="text" id="duration" class="input-box" placeholder="Thời gian bay: 2 tiếng 10 phút">
                            <input type="text" id="seat" class="input-box" placeholder="Ghế: Thông báo khi check-in">
                            <input type="text" id="ticket_id" class="input-box" placeholder="ID vé (Ngẫu nhiên nếu rỗng)">
                            <input type="text" id="quang_duong" class="input-box" placeholder="Quãng đường (Ngẫu nhiên nếu rỗng)">
                            <input type="text" id="congve" class="input-box" placeholder="Cửa: 1">
                        </div>
                    </details>
                </div>

                <button class="btn-submit" id="btnGen" onclick="generateTicket()"><i class="fas fa-magic"></i> Tạo Vé Máy Bay</button>
            </div>
        </div>

        <!-- Preview Panel -->
        <div class="panel">
            <div class="panel-header"><i class="fas fa-image"></i> Kết Quả Vé Bay</div>
            <div class="preview-area" id="previewArea">
                <div class="empty-state" id="emptyState">
                    <i class="fas fa-ticket-alt"></i>
                    <div>Nhập thông tin bên trái để tạo hình ảnh</div>
                </div>
                <img id="resultImg" class="preview-img" src="" alt="Ticket Result">
                <a id="btnDownload" class="btn-download" download="vebay_vna.png"><i class="fas fa-download"></i> Tải Xuống</a>
            </div>
        </div>
    </div>
    
    <script src="/static/chat.js"></script>
    <script>
        function generateTicket() {
            const btn = document.getElementById('btnGen');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
            btn.disabled = true;

            const name = document.getElementById('name').value.trim();
            const code = document.getElementById('code').value.trim();
            const flight = document.getElementById('flight').value.trim();
            const from_kh = document.getElementById('from_kh').value.trim();
            const to_kh = document.getElementById('to_kh').value.trim();
            const from = document.getElementById('from').value.trim() || "HO CHI MINH CITY, VIETNAM";
            const to = document.getElementById('to').value.trim() || "HANOI, VIETNAM";
            const depart = document.getElementById('depart').value.trim() || "22:00";
            const arrive = document.getElementById('arrive').value.trim() || "00:10";
            
            // Default current date format DD/MM/YYYY
            const d = new Date();
            const defDate = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
            const date = document.getElementById('date').value.trim() || defDate;

            if(!name || !code || !flight || !from_kh || !to_kh) {
                alert("Vui lòng nhập Tên, Code, Chuyến bay và Mã Sân Bay.");
                btn.innerHTML = '<i class="fas fa-magic"></i> Tạo Vé Máy Bay';
                btn.disabled = false;
                return;
            }

            const payload = {
                name: name,
                code: code,
                flight: flight,
                from_kh: from_kh,
                to_kh: to_kh,
                from: from,
                to: to,
                depart_time: depart,
                arrive_time: arrive,
                ngay_thang: date,
                plane: document.getElementById('plane').value.trim() || "Airbus Industrie A321 JET",
                duration: document.getElementById('duration').value.trim() || "2 tiếng 10 phút",
                seat: document.getElementById('seat').value.trim() || "Thông báo khi check-in",
                ticket: document.getElementById('ticket_id').value.trim() || String(Math.floor(Math.random() * 900000000000) + 7000000000000),
                quang_duong: document.getElementById('quang_duong').value.trim() || String(Math.floor(Math.random() * 900) + 100),
                congve: document.getElementById('congve').value.trim() || "1"
            };

            fetch('/api/vebay/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            }).then(r=>r.json()).then(data => {
                btn.innerHTML = '<i class="fas fa-magic"></i> Tạo Vé Máy Bay';
                btn.disabled = false;
                
                if(data.success) {
                    document.getElementById('emptyState').style.display = 'none';
                    const img = document.getElementById('resultImg');
                    img.src = data.base64;
                    img.style.display = 'block';
                    
                    const down = document.getElementById('btnDownload');
                    down.href = data.base64;
                    down.style.display = 'flex';
                } else {
                    alert('Lỗi: ' + data.message);
                }
            }).catch(e => {
                btn.innerHTML = '<i class="fas fa-magic"></i> Tạo Vé Máy Bay';
                btn.disabled = false;
                alert('Connection error');
            });
        }
    </script>
</body>
</html>
